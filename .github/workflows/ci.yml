name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-and-run:
    # DPK's FM adapter needs a recent Xcode 26 SDK (see DProvenanceKit#57);
    # macos-26's default toolchain is the newest GitHub-hosted option.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: swift --version && xcodebuild -version
      - name: Build and run the demo (self-checking)
        run: swift run
